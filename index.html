<!DOCTYPE html>

<html lang="th">
<head>

<meta charset="UTF-8">
<title>iStudio by Copperwired Incentive Checker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header class="header">
<h1>iStudio OneBangkok Incentive Checker MAR 2026 🍏</h1>
</header>

<section class="card">

<label>กรอก Part Number</label>

<input
type="text"
id="barcodeInput"
placeholder="กรอก / scan / เลือกรูป"
/>

<div class="btn-group">

<button id="uploadBtn" class="upload-btn">
Select from Gallery
</button>

<button id="scanBtn" class="scan-btn">
Scan Camera
</button>

</div>

<button id="searchBtn" class="check-btn">
Check Incentive 🍎
</button>

<input type="file" id="fileInput" hidden accept="image/*">

<!-- พื้นที่แสดงกล้อง scanner -->

<div id="reader"></div>

</section>

<section class="card result">

<h2 id="productName">รอการค้นหา 👀</h2>

<div class="result-row">
<span>Incentive Sales</span>
<strong id="staffCom">-</strong>
</div>

<div class="result-row">
<span>Incentive พี่ปูน</span>
<strong id="leaderCom">-</strong>
</div>

<div class="result-row">
<span>Incentive ตาแม็ก</span>
<strong id="tamagCom">-</strong>
</div>

<div id="incentiveExtra" style="display:none">

<div class="extra">
<strong>รายละเอียด:</strong>
<span id="incentiveDetail"></span>
</div>

<div class="extra">
<strong>ช่วงเวลา:</strong>
<span id="incentiveDate"></span>
</div>

</div>

</section>

</div>

<!-- ================= Barcode Scanner Libraries ================= -->

<!-- กล้อง Scan Barcode -->

<script src="https://unpkg.com/quagga@0.12.1/dist/quagga.min.js"></script>

<!-- Scan Barcode จากรูป -->

<script src="https://unpkg.com/@zxing/library@latest"></script>

<!-- ================= App Script ================= -->

<script src="app.js"></script>

</body>
</html>
